<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<style>
    .container{
        height: 97vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .form{
        border: 1px solid black;
        border-radius: 10px;
        width: 25%;
        height: 45%;
        display: flex;
        flex-direction: column;
        padding-left: 10px;
        gap: 10px;
    }

    .form h1{
        align-self: center;
        
    }

    .campo{
        display: flex;
        flex-direction: column;
        align-self: center;
        width: 100%;
        height: 20%;
        gap: 10px;
        font-size: 24px;
    }

    .campo input{
        width: 95%;
        height: 30%;
        font-size: 18px;
    }

    .btn-entrar{
        width: 30%;
        height: 30px;
        display: flex;
        align-self: center;
        justify-content: center;
        align-items: center;
        font-size: 20px;
    }

</style>
<body>
    <div class="container">
        <div class="form">
            <h1>Bem vindo</h1>
            <div class="campo">
                <label for="">Email</label>
                <input type="text" name="" id="email_input">
            </div>
            <div class="campo">
                <label for="">Senha</label>
                <input type="password" name="" id="senha_input">
            </div>
            <button class="btn-entrar" onclick="entrar()">Entrar</button>
        </div>
    </div>
</body>
</html>
<script>

    async function entrar() {
        const email = email_input.value;
        const senha = senha_input.value;

        if( await realizarLogin(email, senha)){
            window.location.href = 'index.html';
        }else{
            alert("Email ou senha inválida");
        }
    }



    async function realizarLogin(email, senha) {
    const response = await fetch(`http://localhost:3000/usuarios?email=${email}&senha=${senha}`);

    const data = await response.json();

    if (data.length > 0) {
      const usuario = data[0];
      return true;
    } else {
      return false;
    }

  }
</script>
