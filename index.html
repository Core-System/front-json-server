   }

<body onload="buscar()">
    <div class="container">
    <section>
    <h2>Cadastro</h2>
    <label for="">Nome</label>
    <br>
    <input type="text" name="" id="nome">
    <br>
    <br>
    <label for="email">Email</label>
    <br>
    <input type="text" name="email" id="email">
    <span id="mensagemEmail"></span>
    <br>
    <label for="senha">Senha</label>
    <br>
    <input type="password" name="senha" id="senha">
    <span id="mensagemSenha"></span>
    <br>
    <button class="btn-cadastrar" onclick="criarUsuario()">Cadastrar</button>
    <span id="mensagemSucesso"></span>
    <br>
    </section>
    <br>
    <hr>
    <hr>
     <section>
        <h3>Listagem de Usuários</h3>
        <table class="tabela">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th>Id</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista">
            </tbody>
             </table>
        </div>
    </div>
    </section>
</body>
</html>
<script>
    async function criarUsuario(){
    const nomeUsuario = nome.value;
    const emailUsuario = email.value;
    const senhaUsuario = senha.value;

    const input_email = document.getElementById('email');
    const displayEmail = document.getElementById('mensagemEmail');



    const erroEmail = validarEmail(input_email.value);
    
        if (erroEmail) {
            displayEmail.style.color = "red";
            displayEmail.textContent = erroEmail;
        return;
        }
            displayEmail.textContent = "Email válido!";
            displayEmail.style.color = "green";


    const inputSenha = document.getElementById('senha');
    const displaySenha = document.getElementById('mensagemSenha');
    
    
    
    const erroSenha = validarSenha(inputSenha.value);
    
    if (erroSenha) {
        displaySenha.style.color = "red";
        displaySenha.textContent = erroSenha;
        return;
    }
    displaySenha.textContent = "Senha forte!";
    displaySenha.style.color = "green";
    
    const resposta = await fetch('http://localhost:3000/usuarios',{
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nome: nomeUsuario,
            email: emailUsuario.toLowerCase(),
            senha: senhaUsuario
        })
    }
);
    const dados = await resposta.json();
    const displaySucesso = document.getElementById('mensagemSucesso');
    displaySucesso.textContent = "Usuário cadastrado com sucesso!";
    window.location.reload();

}




async function buscar() {

        const resposta = await fetch('http://localhost:3000/usuarios');
        const dados = await resposta.json();

        const tbody = document.querySelector("#lista");

        let mensagem = "";

        dados.forEach(elementoAtual => {
            mensagem += `
            <tr>
                 <td>${elementoAtual.id}</td>
                <td>${elementoAtual.nome}</td>
                <td>${elementoAtual.email}</td>
                <td>
                    <button class="btn-deletar" onclick="deletarUsuario('${elementoAtual.id}')">Deletar</button>
                </td>
            <tr>`;
        })
        
        tbody.innerHTML = mensagem;
    }

    async function deletarUsuario(idUsuario) {
        const resposta = await fetch(`http://localhost:3000/usuarios/${idUsuario}`, {
            method: "DELETE",
        }
        );
        const dados = await resposta.json();
        buscar()

    }


</script>
